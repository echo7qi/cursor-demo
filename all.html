<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数据看板（汇总）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="appShell">
      <aside class="sidebar">
        <div class="sidebar__brand">数据看板</div>
        <nav class="sidebar__nav">
          <button id="navOps" class="sidebar__link is-active" type="button">运营宣推</button>
          <button id="navWishbar" class="sidebar__link" type="button">祈愿宣发</button>
          <button id="navReach" class="sidebar__link" type="button">目标用户触达</button>
          <a class="sidebar__link" href="./all.html" aria-current="page">汇总页</a>
        </nav>
        <div class="sidebar__hint muted">同一页面汇总查看（Tab 切换）。</div>
      </aside>

      <div class="appShell__content">
        <header class="header">
          <div class="header__title">
            <h1>数据看板（汇总）</h1>
            <div class="header__subtitle">同一地址查看多个模块（本地解析 CSV，不上传数据）</div>
          </div>
          <div class="header__actions">
            <button id="tabOps" class="btn" type="button">运营宣推</button>
            <button id="tabWishbar" class="btn btn--ghost" type="button">祈愿宣发</button>
            <button id="tabReach" class="btn btn--ghost" type="button">目标用户触达</button>
            <button id="exportAllBtn" class="btn" type="button">导出整站快照</button>
          </div>
        </header>

        <main class="container">
          <section class="panel">
            <div class="panel__hint">
              提示：汇总页用 iframe 展示两个模块。若你发现“绑定数据文件夹”无反应，请直接打开对应页面进行绑定（同源安全限制下，部分浏览器不允许在 iframe 内弹出目录选择器）。
              <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
                <a class="btn btn--ghost btn--sm" href="./index.html" target="_blank" rel="noreferrer">打开运营宣推（新窗口）</a>
                <a class="btn btn--ghost btn--sm" href="./wishbar.html" target="_blank" rel="noreferrer">打开祈愿宣发（新窗口）</a>
                <a class="btn btn--ghost btn--sm" href="./reach.html" target="_blank" rel="noreferrer">打开目标用户触达（新窗口）</a>
              </div>
            </div>
          </section>

          <section class="card card--full">
            <div class="card__body" style="padding:0">
              <div class="embedTabs">
                <iframe id="frameOps" class="embedFrame" title="运营宣推" src="./index.html" allow="file-system-access; clipboard-read; clipboard-write"></iframe>
                <iframe id="frameWishbar" class="embedFrame" title="祈愿宣发" src="./wishbar.html" style="display:none" allow="file-system-access; clipboard-read; clipboard-write"></iframe>
                <iframe id="frameReach" class="embedFrame" title="目标用户触达" src="./reach.html" style="display:none" allow="file-system-access; clipboard-read; clipboard-write"></iframe>
              </div>
            </div>
          </section>
        </main>

        <footer class="footer">
          <div class="footer__text">如果你后续希望“同一个 CSV 只选一次就两边联动”，我也可以继续把两个模块做成真正的单页集成版。</div>
        </footer>
      </div>
    </div>

    <script>
      async function exportAllSnapshot() {
        var btn = document.getElementById('exportAllBtn');
        btn.textContent = '正在生成…';
        btn.disabled = true;
        try {
          var fOps = document.getElementById('frameOps');
          var fWish = document.getElementById('frameWishbar');
          var fReach = document.getElementById('frameReach');

          var opsAppRows = [], wishbarRows = [], reachRows = [], reachOpsRows = [];
          try { opsAppRows = fOps.contentWindow.state.rows || []; } catch(_){}
          try { wishbarRows = fWish.contentWindow.rawRows || []; } catch(_){}
          try { reachRows = fReach.contentWindow.rows || []; } catch(_){}
          try { reachOpsRows = fReach.contentWindow.opsRows || []; } catch(_){}

          if (!opsAppRows.length && !wishbarRows.length && !reachRows.length) {
            alert('请先在各模块加载数据，再导出快照。');
            return;
          }

          var dataObj = { opsAppRows: opsAppRows, wishbarRows: wishbarRows, rows: reachRows, opsRows: reachOpsRows };
          var dataPayload = JSON.stringify(dataObj);

          var results = await Promise.all([
            fetch('./styles.css').then(function(r){return r.text()}),
            fetch('./app.js?' + Date.now()).then(function(r){return r.text()}),
            fetch('./wishbar.js?' + Date.now()).then(function(r){return r.text()}),
            fetch('./reach.js?' + Date.now()).then(function(r){return r.text()}),
          ]);
          var cssText = results[0], appJs = results[1], wishbarJs = results[2], reachJs = results[3];

          function buildModulePage(title, innerHtml, jsCode) {
            var hide = '.sidebar{display:none!important}.appShell{grid-template-columns:1fr!important}'
              + '.header__actions .file,.header__actions [id*=Bind],.header__actions [id*=Update],.header__actions [id*=Clear],.header__actions [id*=Export],.header__actions [id*=export]{display:none!important}'
              + '.header{position:static!important;top:auto!important}';
            return '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>'
              + '<title>' + title + '</title>'
              + '<style>' + cssText + '</style><style>' + hide + '</style></head><body>'
              + innerHtml
              + '<scr' + 'ipt>window.__SNAPSHOT_DATA=' + dataPayload + ';</scr' + 'ipt>'
              + '<scr' + 'ipt src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></scr' + 'ipt>'
              + '<scr' + 'ipt src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></scr' + 'ipt>'
              + '<scr' + 'ipt>' + jsCode + '</scr' + 'ipt>'
              + '</body></html>';
          }

          function extractModuleContent(doc, title) {
            var main = doc.querySelector('main.container');
            var mainHtml = main ? main.innerHTML : '';
            return '<div class="appShell"><div class="appShell__content">'
              + '<header class="header"><div class="header__title"><h1>' + title + '</h1>'
              + '<div class="header__subtitle">快照模块（可交互）</div></div><div class="header__actions"></div></header>'
              + '<main class="container">' + mainHtml + '</main>'
              + '</div></div>';
          }

          var opsPage = buildModulePage('运营宣推', extractModuleContent(fOps.contentDocument, '运营宣推数据看板'), appJs);
          var wishPage = buildModulePage('祈愿宣发', extractModuleContent(fWish.contentDocument, '祈愿宣发看板'), wishbarJs);
          var reachPage = buildModulePage('目标用户触达', extractModuleContent(fReach.contentDocument, '祈愿目标用户触达看板'), reachJs);

          var now = new Date();
          var ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

          function toDataUri(html) {
            return 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
          }

          var shellHtml = '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>'
            + '<title>\u6570\u636e\u770b\u677f\u5feb\u7167 ' + ts + '</title>'
            + '<style>' + cssText + '</style>'
            + '<style>.snap-banner{background:linear-gradient(135deg,#f0f4ff,#fdf4ff);border-bottom:1px solid rgba(79,124,255,.15);padding:10px 18px;font-size:12px;color:rgba(15,23,42,.7)}.snap-banner strong{color:rgba(15,23,42,.9)}</style>'
            + '</head><body><div class="appShell"><aside class="sidebar"><div class="sidebar__brand">\u6570\u636e\u770b\u677f</div>'
            + '<nav class="sidebar__nav"><button id="navOps" class="sidebar__link is-active" type="button">\u8fd0\u8425\u5ba3\u63a8</button>'
            + '<button id="navWishbar" class="sidebar__link" type="button">\u7948\u613f\u5ba3\u53d1</button>'
            + '<button id="navReach" class="sidebar__link" type="button">\u76ee\u6807\u7528\u6237\u89e6\u8fbe</button></nav>'
            + '<div class="sidebar__hint muted">\u53ef\u4ea4\u4e92\u5feb\u7167 \u00b7 ' + ts + '</div></aside>'
            + '<div class="appShell__content">'
            + '<div class="snap-banner">\ud83d\udccb <strong>\u53ef\u4ea4\u4e92\u5feb\u7167</strong>\u3000\u6240\u6709\u7b5b\u9009/\u56fe\u8868/\u5c55\u5f00\u5747\u53ef\u6b63\u5e38\u4f7f\u7528\u3000\u00b7\u3000' + ts + '</div>'
            + '<header class="header"><div class="header__title"><h1>\u6570\u636e\u770b\u677f\uff08\u5feb\u7167\uff09</h1></div>'
            + '<div class="header__actions">'
            + '<button id="tabOps" class="btn" type="button">\u8fd0\u8425\u5ba3\u63a8</button>'
            + '<button id="tabWishbar" class="btn btn--ghost" type="button">\u7948\u613f\u5ba3\u53d1</button>'
            + '<button id="tabReach" class="btn btn--ghost" type="button">\u76ee\u6807\u7528\u6237\u89e6\u8fbe</button>'
            + '</div></header>'
            + '<main class="container"><section class="card card--full"><div class="card__body" style="padding:0"><div class="embedTabs">'
            + '<iframe id="frameOps" class="embedFrame" title="\u8fd0\u8425\u5ba3\u63a8"></iframe>'
            + '<iframe id="frameWishbar" class="embedFrame" title="\u7948\u613f\u5ba3\u53d1" style="display:none"></iframe>'
            + '<iframe id="frameReach" class="embedFrame" title="\u76ee\u6807\u7528\u6237\u89e6\u8fbe" style="display:none"></iframe>'
            + '</div></div></section></main>'
            + '</div></div>'
            + '<scr' + 'ipt>'
            + 'var opsUri=' + JSON.stringify(toDataUri(opsPage)) + ';'
            + 'var wishUri=' + JSON.stringify(toDataUri(wishPage)) + ';'
            + 'var reachUri=' + JSON.stringify(toDataUri(reachPage)) + ';'
            + 'document.getElementById("frameOps").src=opsUri;'
            + 'document.getElementById("frameWishbar").src=wishUri;'
            + 'document.getElementById("frameReach").src=reachUri;'
            + 'function setTab(w){'
            + 'var fs=["frameOps","frameWishbar","frameReach"];var ns=["Ops","Wishbar","Reach"];var ks=["ops","wishbar","reach"];'
            + 'fs.forEach(function(f,i){document.getElementById(f).style.display=ks[i]===w?"block":"none"});'
            + 'ns.forEach(function(n,i){var b=document.getElementById("tab"+n);if(b)b.className=ks[i]===w?"btn":"btn btn--ghost";'
            + 'var nb=document.getElementById("nav"+n);if(nb)nb.className=ks[i]===w?"sidebar__link is-active":"sidebar__link"});}'
            + '["tabOps","tabWishbar","tabReach","navOps","navWishbar","navReach"].forEach(function(id){'
            + 'var el=document.getElementById(id);if(el)el.addEventListener("click",function(){setTab(id.replace("tab","").replace("nav","").toLowerCase())})});'
            + '</scr' + 'ipt></body></html>';

          var blob = new Blob([shellHtml], { type: 'text/html;charset=utf-8' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          var d = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
          a.download = '\u6570\u636e\u770b\u677f\u5feb\u7167_' + d + '.html';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() { URL.revokeObjectURL(url); a.remove(); }, 1000);
        } catch(e) {
          alert('导出失败：' + (e.message || e));
        } finally {
          btn.textContent = '\u5bfc\u51fa\u6574\u7ad9\u5feb\u7167';
          btn.disabled = false;
        }
      }
      document.getElementById('exportAllBtn').addEventListener('click', exportAllSnapshot);
    </script>
    <script>
      (function () {
        const tabOps = document.getElementById('tabOps');
        const tabWishbar = document.getElementById('tabWishbar');
        const tabReach = document.getElementById('tabReach');
        const frameOps = document.getElementById('frameOps');
        const frameWishbar = document.getElementById('frameWishbar');
        const frameReach = document.getElementById('frameReach');
        const navOps = document.getElementById('navOps');
        const navWishbar = document.getElementById('navWishbar');
        const navReach = document.getElementById('navReach');
        const ts = Date.now();
        // 避免 iframe 缓存旧脚本/旧页面
        frameOps.src = `./index.html?_ts=${ts}`;
        frameWishbar.src = `./wishbar.html?_ts=${ts}`;
        frameReach.src = `./reach.html?_ts=${ts}`;

        function setTab(which) {
          const isOps = which === 'ops';
          const isWishbar = which === 'wishbar';
          const isReach = which === 'reach';
          frameOps.style.display = isOps ? 'block' : 'none';
          frameWishbar.style.display = isWishbar ? 'block' : 'none';
          frameReach.style.display = isReach ? 'block' : 'none';
          tabOps.className = isOps ? 'btn' : 'btn btn--ghost';
          tabWishbar.className = isWishbar ? 'btn' : 'btn btn--ghost';
          tabReach.className = isReach ? 'btn' : 'btn btn--ghost';
          if (navOps) navOps.className = isOps ? 'sidebar__link is-active' : 'sidebar__link';
          if (navWishbar) navWishbar.className = isWishbar ? 'sidebar__link is-active' : 'sidebar__link';
          if (navReach) navReach.className = isReach ? 'sidebar__link is-active' : 'sidebar__link';
        }

        tabOps.addEventListener('click', () => setTab('ops'));
        tabWishbar.addEventListener('click', () => setTab('wishbar'));
        tabReach.addEventListener('click', () => setTab('reach'));
        navOps?.addEventListener('click', () => setTab('ops'));
        navWishbar?.addEventListener('click', () => setTab('wishbar'));
        navReach?.addEventListener('click', () => setTab('reach'));
        setTab('ops');
      })();
    </script>
  </body>
</html>
